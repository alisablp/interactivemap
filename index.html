<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Piano Stories Map — Brigham Larson Pianos</title>
<meta name="description" content="342 pianos placed and restored across 32 states — explore every piano's story, before-and-after restorations, and 149,000 miles of journeys on the Brigham Larson Pianos map.">
<meta property="og:title" content="Piano Stories Map — Brigham Larson Pianos">
<meta property="og:description" content="Explore hundreds of pianos placed and restored across America — before-and-after galleries, family heirlooms, and the miles they traveled.">
<meta property="og:type" content="website">
<meta property="og:image" content="https://alisablp.github.io/interactivemap/assets/blp-logo@2x.png">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 170'%3E%3Cpath d='M20 54 A40 40 0 1 1 100 54 L61.5 158 A2.5 2.5 0 0 1 58.5 158 Z' fill='%23c9a227' stroke='%235f470c' stroke-width='4'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600&family=Montserrat:wght@500;600&display=swap">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- The Playbill: high-contrast banner — title over a gold rule, stats
     beneath, Start Tour glowing at the right -->
<section class="controls">
  <div class="hero" id="mapHero">
    <div class="hero-inner">
      <h1 class="map-title">Piano Stories Map</h1>
      <div class="gold-rule" aria-hidden="true"></div>
      <p class="map-stats" id="mapStats" aria-live="polite"></p>
    </div>
    <button id="tourBtn" class="tour-cta"><svg width='11' height='12' viewBox='0 0 12 14' fill='currentColor' aria-hidden='true' style='margin-right:8px;vertical-align:-1px'><path d='M1 1.6c0-.9 1-1.4 1.7-1L11 6c.8.5.8 1.6 0 2.1L2.7 13.4c-.7.5-1.7 0-1.7-1z'/></svg>Start Tour</button>
  </div>
</section>

<div id="map" role="application" aria-label="Interactive map of pianos across America">

  <a class="map-brand" href="https://www.brighamlarsonpianos.com" target="_blank" rel="noopener" aria-label="Brigham Larson Pianos">
    <img src="assets/blp-logo.png" srcset="assets/blp-logo@2x.png 2x" alt="Brigham Larson Pianos">
  </a>

  <!-- one floating command bar: search + Filters / Era / Near me -->
  <div class="cmdbar" id="cmdBar">
    <div class="searcharea">
      <div class="searchwrap">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" aria-hidden="true">
          <circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/>
        </svg>
        <input id="search" type="search" placeholder="Search pianos, cities, eras&hellip;" aria-label="Search pianos"
          role="combobox" aria-autocomplete="list" aria-expanded="false" aria-controls="suggest" autocomplete="off">
      </div>
      <div class="suggest" id="suggest" role="listbox" aria-label="Search suggestions" hidden></div>
    </div>
    <button class="cmd-btn" id="cbFilters" data-panel="panelFilters" aria-expanded="false">
      <em>&#9776;</em>Filters
    </button>
    <button class="cmd-btn" id="cbEra" data-panel="panelEra" aria-expanded="false">
      <em>&#9202;</em>Era
    </button>
    <button class="cmd-btn gold" id="cbNear" data-panel="panelNear" aria-expanded="false">
      <em>&#9834;</em>Heirloom?
    </button>
  </div>

  <!-- panels rise from the command bar; one open at a time -->
  <div class="panel" id="panelFilters" hidden>
    <button class="panel-x" data-close aria-label="Close">&times;</button>
    <p class="panel-title">Filter the map</p>
    <div class="chiprow" id="chips">
      <button class="chip on" data-filter="*">All Pianos</button>
      <button class="chip" data-filter="type:Grand">Grand</button>
      <button class="chip" data-filter="type:Upright">Upright</button>
      <button class="chip" data-filter="gallery:both">Before &amp; After</button>
      <button class="chip" data-filter="cat:Family Heirloom">Heirloom</button>
      <button class="chip" data-filter="cat:Player">Modern Player</button>
      <button class="chip" data-filter="cat:Vintage Player">Vintage Player</button>
      <button class="chip" data-filter="cat:Antique">Antique</button>
      <select id="makeSelect" class="chip select" aria-label="Filter by make">
        <option value="">Any Make</option>
      </select>
    </div>
    <button id="reset" class="resetlink">Reset everything</button>
  </div>

  <div class="panel" id="panelEra" hidden>
    <button class="panel-x" data-close aria-label="Close">&times;</button>
    <div class="timebar" id="timeBar">
      <div class="tb-label" id="tbLabel">Every Era of Piano History</div>
      <input type="range" id="timeSlider" min="1850" max="2026" step="2" value="2026" aria-label="Filter pianos by era">
      <div class="tb-ends"><span>1850</span><span>2026</span></div>
    </div>
  </div>

  <div class="panel" id="panelNear" hidden>
    <button class="panel-x" data-close aria-label="Close">&times;</button>
    <div class="lead-box" id="leadBox">
      <p class="lb-title">Do you have a family heirloom?</p>
      <p class="lb-hint">Type your ZIP code to see how close we've delivered a restored piano to you.</p>
      <form id="zipForm" autocomplete="off">
        <input id="zipInput" inputmode="numeric" pattern="[0-9]{5}" maxlength="5" placeholder="ZIP code" aria-label="Your ZIP code">
        <button type="submit" aria-label="Find the nearest restored piano">Go</button>
      </form>
      <p class="lb-result" id="zipResult"></p>
      <a class="lb-cta" href="https://www.brighamlarsonpianos.com/pages/free-family-heirloom-restoration-evaluation" target="_blank" rel="noopener">FREE Restoration Quote</a>
    </div>
  </div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
