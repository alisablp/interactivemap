<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pianos Across America — Brigham Larson Pianos</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600&display=swap">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<section class="controls">
  <h1 class="map-title">Piano Stories Across America</h1>
  <img class="map-logo" src="assets/blp-logo.png" srcset="assets/blp-logo@2x.png 2x" alt="Brigham Larson Pianos">
  <div class="searchwrap">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" aria-hidden="true">
      <circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/>
    </svg>
    <input id="search" type="search" placeholder='Search — try "Steinway", "Grand", "1910", "Utah"…' aria-label="Search pianos">
  </div>

  <div class="chiprow" id="chips">
    <button class="chip on" data-filter="*">All Pianos</button>
    <button class="chip" data-filter="type:Grand">Grand</button>
    <button class="chip" data-filter="type:Upright">Upright</button>
    <button class="chip" data-filter="gallery:both">Before &amp; After</button>
    <button class="chip" data-filter="cat:Family Heirloom">Heirloom</button>
    <button class="chip" data-filter="cat:Player">Modern Player</button>
    <button class="chip" data-filter="cat:Vintage Player">Vintage Player</button>
    <button class="chip" data-filter="cat:Antique">Antique</button>
    <select id="makeSelect" class="chip select" aria-label="Filter by make">
      <option value="">Any Make</option>
    </select>
    <button id="reset" class="resetlink">Reset</button>
  </div>

</section>

<div id="map" role="application" aria-label="Interactive map of pianos across America">
  <div class="lead-box" id="leadBox">
    <p class="lb-title">Do you have a family heirloom?</p>
    <p class="lb-hint">Type your ZIP code to see how close we've delivered a restored piano to you.</p>
    <form id="zipForm" autocomplete="off">
      <input id="zipInput" inputmode="numeric" pattern="[0-9]{5}" maxlength="5" placeholder="ZIP code" aria-label="Your ZIP code">
      <button type="submit" aria-label="Find the nearest restored piano">Go</button>
    </form>
    <p class="lb-result" id="zipResult"></p>
    <a class="lb-cta" href="https://www.brighamlarsonpianos.com/pages/free-family-heirloom-restoration-evaluation" target="_blank" rel="noopener">FREE Restoration Quote</a>
  </div>
  <div class="timebar" id="timeBar">
    <div class="tb-label" id="tbLabel">Every Era of American Piano History</div>
    <input type="range" id="timeSlider" min="1850" max="2026" step="2" value="2026" aria-label="Filter pianos by era">
    <div class="tb-ends"><span>1850</span><span>2026</span></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
